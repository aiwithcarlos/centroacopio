<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 60">
  <!-- Bandera de Venezuela -->
  <!-- Franja amarilla (superior) -->
  <rect width="90" height="20" fill="#FFD700"/>
  <!-- Franja azul (centro) -->
  <rect y="20" width="90" height="20" fill="#00247D"/>
  <!-- Franja roja (inferior) -->
  <rect y="40" width="90" height="20" fill="#CF142B"/>
  <!-- 7 estrellas blancas en línea horizontal sobre la franja azul -->
  <g fill="white">
    <polygon points="25,30 27.5,24 30,30 24,26.5 31,26.5" />
    <polygon points="35,30 37.5,24 40,30 34,26.5 41,26.5" />
    <polygon points="45,30 47.5,24 50,30 44,26.5 51,26.5" />
    <polygon points="55,30 57.5,24 60,30 54,26.5 61,26.5" />
    <polygon points="65,30 67.5,24 70,30 64,26.5 71,26.5" />
    <polygon points="75,30 77.5,24 80,30 74,26.5 81,26.5" />
    <polygon points="85,30 87.5,24 90,30 84,26.5 91,26.5" />
  </g>
</svg>
